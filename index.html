<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코트전략마스터 - 김진우 선생님</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel (JSX 변환용) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f8fafc; overflow: hidden; }
        #root { height: 100vh; }
        @keyframes bounce-subtle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        .animate-bounce-subtle { animation: bounce-subtle 2s ease-in-out infinite; }
        @keyframes pulse-slow { 0%, 100% { opacity: 0.1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.02); } }
        .animate-pulse-slow { animation: pulse-slow 3s ease-in-out infinite; }
        @keyframes bounce-success { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-bounce-success { animation: bounce-success 0.5s ease-in-out 3; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- Inline SVG Icons (Lucide replacement for standalone environment) ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Trophy: <path d="M6 9H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h2m12 6h2a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2h-2M6 13c0 2.2 1.8 4 4 4h4c2.2 0 4-1.8 4-4V5H6v8zm4 4v3m4-3v3m-5 0h6" />,
                Users: <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2m7-10a4 4 0 1 0 0-8 4 4 0 0 0 0 8m13 10v-2a4 4 0 0 0-3-3.87m-4-12a4 4 0 0 1 0 7.75" />,
                Map: <path d="M14.12 3.88 16 2l3 3-1.88 1.88a.75.75 0 0 0 0 1.06L20 10.82V15a2 2 0 0 1-2 2h-3.18l-2.94 2.94a.75.75 0 0 1-1.06 0L7.88 17H4a2 2 0 0 1-2-2v-4.18l2.94-2.94a.75.75 0 0 0 0-1.06L3.06 4.76V2h4.18l2.94 2.94a.75.75 0 0 0 1.06 0L13.12 3.12a.75.75 0 0 1 1.06 0Z" />,
                Pencil: <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z" />,
                Trash2: <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2m-6 5v6m4-6v6" />,
                RotateCcw: <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8m0-5v5h5" />,
                Lightbulb: <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A5 5 0 0 0 8 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5m1 2h2m-2 3h2" />,
                ChevronRight: <path d="m9 18 6-6-6-6" />,
                Move: <path d="m15 19-3 3-3-3m12-7 3-3-3-3M9 5l3-3 3 3M5 9l-3 3 3 3" />,
                UserPlus: <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2m7-10a4 4 0 1 0 0-8 4 4 0 0 0 0 8m10 5v6m3-3h-6" />,
                UserMinus: <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2m7-10a4 4 0 1 0 0-8 4 4 0 0 0 0 8m14 5h-6" />,
                CheckCircle: <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14m1 3L12 15l-3-3" />,
                XCircle: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10" />
                        <path d="m15 9-6 6m0-6 6 6" />
                    </React.Fragment>
                ),
                Play: <path d="m7 4 12 8-12 8V4z" />
            };
            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={className}
                >
                    {icons[name]}
                </svg>
            );
        };

        const COURT_TYPES = {
            basketball: {
                name: '농구',
                color: '#f97316',
                ratio: 1.6,
                lines: (w, h) => (
                    <svg className="absolute inset-0 w-full h-full pointer-events-none">
                        <rect x="5%" y="5%" width="90%" height="90%" fill="none" stroke="white" strokeWidth="2" />
                        <line x1="50%" y1="5%" x2="50%" y2="95%" stroke="white" strokeWidth="2" />
                        <circle cx="50%" cy="50%" r="10%" fill="none" stroke="white" strokeWidth="2" />
                        <path d={`M ${w * 0.05},${h * 0.2} L ${w * 0.12},${h * 0.2} Q ${w * 0.35},${h * 0.2} ${w * 0.35},${h * 0.5} T ${w * 0.12},${h * 0.8} L ${w * 0.05},${h * 0.8}`} fill="none" stroke="white" strokeWidth="2" />
                        <path d={`M ${w * 0.95},${h * 0.2} L ${w * 0.88},${h * 0.2} Q ${w * 0.65},${h * 0.2} ${w * 0.65},${h * 0.5} T ${w * 0.88},${h * 0.8} L ${w * 0.95},${h * 0.8}`} fill="none" stroke="white" strokeWidth="2" />
                        <line x1="7%" y1="42%" x2="7%" y2="58%" stroke="white" strokeWidth="4" />
                        <circle cx="9%" cy="50%" r="2%" fill="none" stroke="#ef4444" strokeWidth="3" />
                        <line x1="93%" y1="42%" x2="93%" y2="58%" stroke="white" strokeWidth="4" />
                        <circle cx="91%" cy="50%" r="2%" fill="none" stroke="#ef4444" strokeWidth="3" />
                    </svg>
                )
            },
            futsal: {
                name: '풋살',
                color: '#22c55e',
                ratio: 1.5,
                lines: (w, h) => (
                    <svg className="absolute inset-0 w-full h-full pointer-events-none">
                        <rect x="5%" y="5%" width="90%" height="90%" fill="none" stroke="white" strokeWidth="2" />
                        <line x1="50%" y1="5%" x2="50%" y2="95%" stroke="white" strokeWidth="2" />
                        <circle cx="50%" cy="50%" r="8%" fill="none" stroke="white" strokeWidth="2" />
                        <path d={`M ${w * 0.05},${h * 0.25} A ${w * 0.15} ${h * 0.25} 0 0 1 ${w * 0.05} ${h * 0.75}`} fill="none" stroke="white" strokeWidth="2" />
                        <path d={`M ${w * 0.95},${h * 0.25} A ${w * 0.15} ${h * 0.25} 0 0 0 ${w * 0.95} ${h * 0.75}`} fill="none" stroke="white" strokeWidth="2" />
                        <rect x="2.5%" y="40%" width="2.5%" height="20%" fill="none" stroke="white" strokeWidth="3" />
                        <rect x="95%" y="40%" width="2.5%" height="20%" fill="none" stroke="white" strokeWidth="3" />
                    </svg>
                )
            },
            volleyball: {
                name: '배구',
                color: '#3b82f6',
                ratio: 1.8,
                lines: (w, h) => (
                    <svg className="absolute inset-0 w-full h-full pointer-events-none">
                        <rect x="10%" y="10%" width="80%" height="80%" fill="none" stroke="white" strokeWidth="2" />
                        <line x1="36.6%" y1="10%" x2="36.6%" y2="90%" stroke="white" strokeWidth="2" strokeDasharray="5,5" />
                        <line x1="63.3%" y1="10%" x2="63.3%" y2="90%" stroke="white" strokeWidth="2" strokeDasharray="5,5" />
                        <rect x="49.5%" y="5%" width="1%" height="90%" fill="rgba(255,255,255,0.3)" />
                        <line x1="50%" y1="5%" x2="50%" y2="95%" stroke="#cbd5e1" strokeWidth="6" />
                        {[...Array(10)].map((_, i) => (
                            <line key={i} x1="49.5%" y1={`${10 + i * 8}%`} x2="50.5%" y2={`${10 + i * 8}%`} stroke="white" strokeWidth="1" />
                        ))}
                    </svg>
                )
            }
        };

        const STRATEGY_CHALLENGES = [
            {
                id: 1, title: "농구: 공간 창출", courtType: 'basketball',
                description: "공격수 1명을 코너 구석(흰 점선 구역)으로 이동시켜 수비수를 끌어내고 패스 길을 여세요.",
                tip: "공간을 넓게 쓰는 것이 핵심입니다.",
                initialPlayers: [
                    { id: 1, x: 25, y: 50, team: 'A', role: '공격1' },
                    { id: 2, x: 25, y: 35, team: 'A', role: '공격2' },
                    { id: 3, x: 18, y: 45, team: 'B', role: '수비1' },
                    { id: 'ball', x: 25, y: 50, team: 'none', isBall: true }
                ],
                targetZone: { x: 5, y: 85, w: 15, h: 10, type: 'rect' },
                checkSuccess: (players) => players.some(p => p.team === 'A' && p.x < 20 && p.y > 75)
            },
            {
                id: 2, title: "풋살: 다이아몬드 대형", courtType: 'futsal',
                description: "선수 4명을 다이아몬드 대형으로 배치하여 균형 잡힌 공수 포메이션을 만드세요.",
                tip: "피보, 알라, 픽소 포지션을 생각하세요.",
                initialPlayers: [
                    { id: 1, x: 48, y: 48, team: 'A', role: 'P' }, { id: 2, x: 50, y: 50, team: 'A', role: 'P' },
                    { id: 3, x: 52, y: 52, team: 'A', role: 'P' }, { id: 4, x: 54, y: 54, team: 'A', role: 'P' },
                    { id: 'ball', x: 20, y: 50, team: 'none', isBall: true }
                ],
                targetZone: { x: 50, y: 50, r: 25, type: 'circle' },
                checkSuccess: (players) => {
                    const teamA = players.filter(p => p.team === 'A');
                    if (teamA.length < 4) return false;
                    return teamA.some(p => p.x < 40) && teamA.some(p => p.x > 60) && teamA.some(p => p.y < 35) && teamA.some(p => p.y > 65);
                }
            },
            {
                id: 3, title: "배구: 기본 수비 대형", courtType: 'volleyball',
                description: "강력한 스파이크를 막기 위해 수비수 3명을 부채꼴 모양으로 배치하세요.",
                tip: "엔드라인 근처를 넓게 커버해야 합니다.",
                initialPlayers: [
                    { id: 1, x: 70, y: 50, team: 'A', role: '수비' }, { id: 2, x: 75, y: 45, team: 'A', role: '수비' },
                    { id: 3, x: 75, y: 55, team: 'A', role: '수비' },
                    { id: 'ball', x: 20, y: 50, team: 'none', isBall: true }
                ],
                targetZone: { x: 85, y: 50, w: 10, h: 80, type: 'rect' },
                checkSuccess: (players) => {
                    const teamA = players.filter(p => p.team === 'A' && p.x > 75);
                    const spread = Math.max(...teamA.map(p => p.y)) - Math.min(...teamA.map(p => p.y));
                    return teamA.length >= 3 && spread > 40;
                }
            },
            {
                id: 4, title: "농구: 픽앤롤", courtType: 'basketball',
                description: "센터가 스크린 이후 골밑으로 파고드는 '롤' 동작을 수행하세요.",
                tip: "수비수 뒤쪽 공간으로 빠르게 이동하세요.",
                initialPlayers: [
                    { id: 1, x: 35, y: 40, team: 'A', role: '가드' }, { id: 2, x: 30, y: 45, team: 'A', role: '센터' },
                    { id: 3, x: 28, y: 40, team: 'B', role: '수비' },
                    { id: 'ball', x: 35, y: 40, team: 'none', isBall: true }
                ],
                targetZone: { x: 10, y: 50, r: 10, type: 'circle' },
                checkSuccess: (players) => {
                    const center = players.find(p => p.role === '센터');
                    return center && center.x < 15 && center.y > 40 && center.y < 60;
                }
            },
            {
                id: 5, title: "풋살: 전방 압박", courtType: 'futsal',
                description: "모든 선수가 하프라인을 넘어 전진하여 강력한 압박 대형을 만드세요.",
                tip: "전체적인 수비 라인을 높여야 합니다.",
                initialPlayers: [
                    { id: 1, x: 40, y: 30, team: 'A', role: '압박' }, { id: 2, x: 40, y: 50, team: 'A', role: '압박' },
                    { id: 3, x: 40, y: 70, team: 'A', role: '압박' },
                    { id: 'ball', x: 80, y: 50, team: 'none', isBall: true }
                ],
                targetZone: { x: 75, y: 50, w: 40, h: 90, type: 'rect' },
                checkSuccess: (players) => players.filter(p => p.team === 'A').every(p => p.x > 55)
            },
            {
                id: 6, title: "배구: 세터의 이동", courtType: 'volleyball',
                description: "후방 세터가 리시브 직후 네트 앞 중앙으로 빠르게 이동하게 하세요.",
                tip: "공격 조율을 위한 준비가 필요합니다.",
                initialPlayers: [
                    { id: 1, x: 80, y: 80, team: 'A', role: '세터' }, { id: 2, x: 70, y: 50, team: 'A', role: '공격' },
                    { id: 3, x: 70, y: 20, team: 'A', role: '공격' },
                    { id: 'ball', x: 20, y: 50, team: 'none', isBall: true }
                ],
                targetZone: { x: 55, y: 50, r: 8, type: 'circle' },
                checkSuccess: (players) => {
                    const setter = players.find(p => p.role === '세터');
                    return setter && setter.x < 65 && setter.x > 50 && setter.y > 40 && setter.y < 60;
                }
            }
        ];

        const BallIcon = ({ type }) => {
            const commonProps = { viewBox: "0 0 100 100", className: "w-full h-full" };
            if (type === 'basketball') return (
                <svg {...commonProps}><circle cx="50" cy="50" r="45" fill="#f97316" stroke="#431407" strokeWidth="2" /><path d="M 10,50 Q 50,50 90,50" fill="none" stroke="#431407" strokeWidth="3" /><path d="M 50,10 Q 50,50 50,90" fill="none" stroke="#431407" strokeWidth="3" /><path d="M 20,20 Q 50,50 80,80" fill="none" stroke="#431407" strokeWidth="2" /><path d="M 80,20 Q 50,50 20,80" fill="none" stroke="#431407" strokeWidth="2" /></svg>
            );
            if (type === 'futsal') return (
                <svg {...commonProps}><circle cx="50" cy="50" r="45" fill="white" stroke="#1e293b" strokeWidth="2" /><path d="M 50,20 L 30,35 L 35,60 L 65,60 L 70,35 Z" fill="#1e293b" /><path d="M 50,20 L 50,5" fill="none" stroke="#1e293b" strokeWidth="2" /><path d="M 30,35 L 15,30" fill="none" stroke="#1e293b" strokeWidth="2" /><path d="M 35,60 L 25,75" fill="none" stroke="#1e293b" strokeWidth="2" /><path d="M 65,60 L 75,75" fill="none" stroke="#1e293b" strokeWidth="2" /><path d="M 70,35 L 85,30" fill="none" stroke="#1e293b" strokeWidth="2" /></svg>
            );
            if (type === 'volleyball') return (
                <svg {...commonProps}><circle cx="50" cy="50" r="45" fill="#fde047" stroke="#1d4ed8" strokeWidth="2" /><path d="M 20,30 Q 50,50 80,30" fill="none" stroke="#1d4ed8" strokeWidth="4" /><path d="M 20,70 Q 50,50 80,70" fill="none" stroke="#1d4ed8" strokeWidth="4" /><path d="M 50,10 Q 50,50 50,90" fill="none" stroke="#1d4ed8" strokeWidth="4" /><circle cx="50" cy="50" r="45" fill="none" stroke="white" strokeWidth="2" strokeDasharray="1,5" /></svg>
            );
            return <div className="w-full h-full rounded-full bg-slate-300" />;
        };

        const App = () => {
            const [courtType, setCourtType] = useState('basketball');
            const [players, setPlayers] = useState([
                { id: 1, x: 20, y: 30, team: 'A', role: '공격' },
                { id: 2, x: 20, y: 70, team: 'A', role: '공격' },
                { id: 3, x: 80, y: 50, team: 'B', role: '수비' },
                { id: 'ball', x: 50, y: 50, team: 'none', isBall: true }
            ]);
            const [drawing, setDrawing] = useState([]);
            const [isDrawingMode, setIsDrawingMode] = useState(false);
            const [isDeleteMode, setIsDeleteMode] = useState(false);
            const [activeTab, setActiveTab] = useState('board');
            const [currentChallengeIdx, setCurrentChallengeIdx] = useState(0);
            const [challengeResult, setChallengeResult] = useState(null);
            const [showHint, setShowHint] = useState(false);

            const containerRef = useRef(null);
            const isDrawingActive = useRef(false);

            const getCoords = (e) => {
                if (!containerRef.current) return { x: 0, y: 0 };
                const rect = containerRef.current.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                return { x, y };
            };

            const startChallenge = (idx) => {
                const ch = STRATEGY_CHALLENGES[idx];
                setCourtType(ch.courtType);
                setPlayers(JSON.parse(JSON.stringify(ch.initialPlayers)));
                setDrawing([]); setChallengeResult(null); setShowHint(false);
                setCurrentChallengeIdx(idx); setActiveTab('challenge_play');
            };

            const checkChallenge = () => {
                const isSuccess = STRATEGY_CHALLENGES[currentChallengeIdx].checkSuccess(players);
                setChallengeResult(isSuccess ? 'success' : 'fail');
            };

            const addPlayer = (team) => {
                const newId = Date.now();
                setPlayers(prev => [...prev, { id: newId, x: 50, y: team === 'A' ? 20 : 80, team, role: team === 'A' ? '공격' : '수비' }]);
            };

            const removePlayer = (id) => { if (id !== 'ball') setPlayers(prev => prev.filter(p => p.id !== id)); };

            const handleStartDrawing = (e) => {
                if (!isDrawingMode) return;
                e.target.setPointerCapture(e.pointerId);
                isDrawingActive.current = true;
                setDrawing(prev => [...prev, [getCoords(e)]]);
            };

            const handleMoveDrawing = (e) => {
                if (!isDrawingActive.current) return;
                const point = getCoords(e);
                setDrawing(prev => {
                    const last = prev[prev.length - 1];
                    return [...prev.slice(0, -1), [...last, point]];
                });
            };

            const handleEndDrawing = (e) => { if (isDrawingActive.current) { e.target.releasePointerCapture(e.pointerId); isDrawingActive.current = false; } };

            const handlePlayerDragStart = (e, id) => {
                if (isDrawingMode) return;
                if (isDeleteMode) { removePlayer(id); return; }
                e.stopPropagation();
                const onPointerMove = (me) => {
                    const c = getCoords(me);
                    if (c.x >= 0 && c.x <= 100 && c.y >= 0 && c.y <= 100) {
                        setPlayers(prev => prev.map(p => p.id === id ? { ...p, x: c.x, y: c.y } : p));
                    }
                };
                const onPointerUp = () => { window.removeEventListener('pointermove', onPointerMove); window.removeEventListener('pointerup', onPointerUp); };
                window.addEventListener('pointermove', onPointerMove);
                window.addEventListener('pointerup', onPointerUp);
            };

            const resetBoard = () => {
                setDrawing([]);
                setPlayers([{ id: 1, x: 20, y: 30, team: 'A', role: '공격' }, { id: 2, x: 20, y: 70, team: 'A', role: '공격' }, { id: 3, x: 80, y: 50, team: 'B', role: '수비' }, { id: 'ball', x: 50, y: 50, team: 'none', isBall: true }]);
                setChallengeResult(null);
            };

            return (
                <div className="flex flex-col h-screen bg-slate-50 font-sans text-slate-900 overflow-hidden select-none">
                    <header className="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm z-50">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-lg text-white"><Icon name="Trophy" size={24} /></div>
                            <h1 className="text-xl font-bold tracking-tight">코트전략마스터</h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => { setActiveTab('board'); setChallengeResult(null); }} className={`px-4 py-2 rounded-full text-sm font-medium transition-colors ${activeTab === 'board' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600'}`}>자유 전술판</button>
                            <button onClick={() => { setActiveTab('challenge'); setChallengeResult(null); }} className={`px-4 py-2 rounded-full text-sm font-medium transition-colors ${activeTab === 'challenge' || activeTab === 'challenge_play' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600'}`}>전략 챌린지</button>
                        </div>
                    </header>

                    <main className="flex-1 flex overflow-hidden">
                        <aside className="w-80 bg-white border-r p-6 flex flex-col gap-6 overflow-y-auto z-40 shadow-md">
                            {activeTab === 'board' ? (
                                <>
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 block">종목 선택</label>
                                        <div className="grid grid-cols-1 gap-2">
                                            {Object.entries(COURT_TYPES).map(([key, value]) => (
                                                <button key={key} onClick={() => { setCourtType(key); resetBoard(); }} className={`flex items-center gap-3 p-3 rounded-xl border-2 transition-all ${courtType === key ? 'border-indigo-600 bg-indigo-50' : 'border-slate-100 hover:border-slate-200'}`}>
                                                    <Icon name="Map" size={18} className={courtType === key ? 'text-indigo-600' : 'text-slate-400'} />
                                                    <span className={`text-sm font-semibold ${courtType === key ? 'text-indigo-700' : 'text-slate-600'}`}>{value.name}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="pt-4 border-t">
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 block">선수 관리</label>
                                        <div className="grid grid-cols-2 gap-2 mb-3">
                                            <button onClick={() => addPlayer('A')} className="flex flex-col items-center gap-1 p-3 rounded-xl bg-rose-50 text-rose-600 hover:bg-rose-100 border border-rose-200"><Icon name="UserPlus" size={20} /><span className="text-[10px] font-bold">공격수 추가</span></button>
                                            <button onClick={() => addPlayer('B')} className="flex flex-col items-center gap-1 p-3 rounded-xl bg-indigo-50 text-indigo-600 hover:bg-indigo-100 border border-indigo-200"><Icon name="UserPlus" size={20} /><span className="text-[10px] font-bold">수비수 추가</span></button>
                                        </div>
                                        <button onClick={() => { setIsDeleteMode(!isDeleteMode); setIsDrawingMode(false); }} className={`flex items-center justify-between w-full p-3 rounded-xl border-2 transition-all ${isDeleteMode ? 'bg-red-50 border-red-500 text-red-700' : 'bg-white border-slate-100'}`}><div className="flex items-center gap-2"><Icon name="UserMinus" size={18} /><span className="text-sm font-semibold">선수 삭제 모드</span></div><div className={`w-10 h-5 rounded-full relative ${isDeleteMode ? 'bg-red-500' : 'bg-slate-200'}`}><div className={`absolute top-1 w-3 h-3 bg-white rounded-full transition-all ${isDeleteMode ? 'right-1' : 'left-1'}`} /></div></button>
                                    </div>
                                    <div className="pt-4 border-t">
                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 block">도구</label>
                                        <div className="flex flex-col gap-2">
                                            <button onClick={() => { setIsDrawingMode(!isDrawingMode); setIsDeleteMode(false); }} className={`flex items-center justify-between p-3 rounded-xl border-2 transition-all ${isDrawingMode ? 'bg-amber-50 border-amber-500 text-amber-700' : 'bg-white border-slate-100'}`}><div className="flex items-center gap-2"><Icon name="Pencil" size={18} /><span className="text-sm font-semibold">그리기 모드</span></div><div className={`w-10 h-5 rounded-full relative ${isDrawingMode ? 'bg-amber-500' : 'bg-slate-200'}`}><div className={`absolute top-1 w-3 h-3 bg-white rounded-full transition-all ${isDrawingMode ? 'right-1' : 'left-1'}`} /></div></button>
                                            <button onClick={() => setDrawing([])} className="flex items-center gap-2 p-3 rounded-xl bg-slate-50 text-slate-600 border border-slate-200"><Icon name="Trash2" size={18} /><span className="text-sm font-semibold">선 지우기</span></button>
                                            <button onClick={resetBoard} className="flex items-center gap-2 p-3 rounded-xl bg-slate-50 text-slate-600 border border-slate-200"><Icon name="RotateCcw" size={18} /><span className="text-sm font-semibold">초기화</span></button>
                                        </div>
                                    </div>
                                </>
                            ) : activeTab === 'challenge' ? (
                                <div className="flex flex-col gap-4">
                                    <div className="flex items-center gap-2 mb-2"><Icon name="Lightbulb" className="text-amber-500" /><h2 className="text-lg font-bold">전략 챌린지 선택</h2></div>
                                    <div className="space-y-2">{STRATEGY_CHALLENGES.map((ch, idx) => (<button key={ch.id} onClick={() => startChallenge(idx)} className="flex items-center justify-between w-full p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 hover:border-indigo-400 hover:bg-white transition-all text-left"><div className="flex flex-col gap-1"><span className="text-[10px] font-bold text-indigo-500 uppercase tracking-widest">{ch.courtType}</span><span className="font-bold text-slate-800 text-sm">{ch.title}</span></div><Icon name="Play" size={16} className="text-slate-400" /></button>))}</div>
                                </div>
                            ) : (
                                <div className="flex flex-col h-full">
                                    <button onClick={() => setActiveTab('challenge')} className="mb-4 text-xs text-indigo-600 flex items-center gap-1 font-bold uppercase tracking-wider"><Icon name="ChevronRight" size={14} className="rotate-180" /> 챌린지 목록으로</button>
                                    <h2 className="text-xl font-bold text-slate-800 mb-2">{STRATEGY_CHALLENGES[currentChallengeIdx].title}</h2>
                                    <div className="bg-indigo-50 p-4 rounded-2xl border border-indigo-100 mb-6"><p className="text-sm text-indigo-900 leading-relaxed font-medium">{STRATEGY_CHALLENGES[currentChallengeIdx].description}</p></div>
                                    <button onClick={() => setShowHint(!showHint)} className="w-full py-3 px-4 rounded-xl border border-amber-200 bg-amber-50 text-amber-700 text-xs font-bold flex items-center justify-center gap-2"><Icon name="Lightbulb" size={16} /> {showHint ? '힌트 닫기' : '힌트 보기'}</button>
                                    {showHint && <p className="mt-2 text-xs text-amber-800 bg-amber-100/50 p-3 rounded-lg italic">{STRATEGY_CHALLENGES[currentChallengeIdx].tip}</p>}
                                    <div className="mt-auto space-y-3">
                                        {challengeResult === 'success' && (<div className="p-4 bg-emerald-50 text-emerald-700 rounded-2xl border border-emerald-200 flex items-center gap-3 animate-bounce-success"><Icon name="CheckCircle" size={24} /><div className="flex flex-col"><span className="font-bold text-sm">성공입니다!</span><span className="text-[10px]">전술적 목표를 달성했습니다.</span></div></div>)}
                                        {challengeResult === 'fail' && (<div className="p-4 bg-rose-50 text-rose-700 rounded-2xl border border-rose-200 flex items-center gap-3"><Icon name="XCircle" size={24} /><div className="flex flex-col"><span className="font-bold text-sm">다시 확인해보세요</span><span className="text-[10px]">선수들의 위치를 조금 더 조정해보세요.</span></div></div>)}
                                        <button onClick={checkChallenge} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black text-lg shadow-xl shadow-indigo-200 hover:bg-indigo-700 active:scale-95 transition-all">배치 완료</button>
                                    </div>
                                </div>
                            )}
                        </aside>

                        <section className="flex-1 bg-slate-100 p-8 flex items-center justify-center relative">
                            <div ref={containerRef} className={`relative shadow-2xl rounded-sm border-4 border-slate-800 bg-white overflow-hidden touch-none ${isDeleteMode ? 'ring-4 ring-red-400' : ''}`} style={{ width: 'min(90%, 800px)', aspectRatio: COURT_TYPES[courtType].ratio, backgroundColor: COURT_TYPES[courtType].color }}>
                                {COURT_TYPES[courtType].lines(800, 800 / COURT_TYPES[courtType].ratio)}
                                {activeTab === 'challenge_play' && (
                                    <div className="absolute inset-0 pointer-events-none z-0">
                                        {(() => {
                                            const z = STRATEGY_CHALLENGES[currentChallengeIdx].targetZone;
                                            const style = z.type === 'circle' ? { left: `${z.x - z.r}%`, top: `${z.y - z.r}%`, width: `${z.r * 2}%`, height: `${z.r * 2 / COURT_TYPES[courtType].ratio * 1.6}%`, borderRadius: '50%' } : { left: `${z.x - z.w / 2}%`, top: `${z.y - z.h / 2}%`, width: `${z.w}%`, height: `${z.h}%` };
                                            return <div className="absolute border-4 border-white border-dashed bg-white/5 animate-pulse-slow" style={style} />;
                                        })()}
                                    </div>
                                )}
                                <svg className="absolute inset-0 w-full h-full pointer-events-none z-10" viewBox="0 0 100 100" preserveAspectRatio="none">
                                    {drawing.map((path, idx) => (<path key={idx} d={`M ${path.map(p => `${p.x} ${p.y}`).join(' L ')}`} fill="none" stroke="white" strokeWidth="0.8" strokeLinecap="round" strokeLinejoin="round" opacity="0.9" />))}
                                </svg>
                                {players.map((p) => (
                                    <div key={p.id} onPointerDown={(e) => handlePlayerDragStart(e, p.id)} className={`absolute w-12 h-12 -ml-6 -mt-6 rounded-full flex items-center justify-center shadow-xl transform transition-all active:scale-110 select-none ${p.isBall ? 'z-30 p-1' : p.team === 'A' ? 'bg-rose-500 border-2 border-white text-white z-20' : 'bg-indigo-500 border-2 border-white text-white z-20'} ${isDrawingMode ? 'opacity-50 cursor-default' : 'cursor-move'} ${isDeleteMode && !p.isBall ? 'hover:bg-red-700' : ''}`} style={{ left: `${p.x}%`, top: `${p.y}%`, pointerEvents: isDrawingMode ? 'none' : 'auto' }}>
                                        {p.isBall ? <div className="w-full h-full animate-bounce-subtle"><BallIcon type={courtType} /></div> : <div className="flex flex-col items-center"><Icon name="Users" size={16} /><span className="text-[10px] font-bold tracking-tighter">{p.role}</span></div>}
                                        {isDeleteMode && !p.isBall && <div className="absolute inset-0 bg-red-600/80 rounded-full flex items-center justify-center text-white"><Icon name="Trash2" size={20} /></div>}
                                    </div>
                                ))}
                                {isDrawingMode && <div className="absolute inset-0 z-40 cursor-crosshair touch-none" onPointerDown={handleStartDrawing} onPointerMove={handleMoveDrawing} onPointerUp={handleEndDrawing} onPointerCancel={handleEndDrawing} />}
                            </div>
                        </section>
                    </main>

                    <footer className="bg-white border-t px-6 py-3 text-center z-50">
                        <p className="text-[10px] text-slate-400 font-medium italic leading-relaxed">
                            &copy; 2026 코트전략마스터 교육 도구. 전략은 공간을 지배하는 팀이 승리합니다.<br/>
                            개발자: 김진우 선생님
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
